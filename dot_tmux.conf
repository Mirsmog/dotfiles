# ==============================================
# Tmux Configuration
# ==============================================

# Prefix: Alt-a
unbind C-b
unbind C-a
set -g prefix M-a
bind M-a send-prefix
set -g prefix2 C-a
bind C-a send-prefix

# ==============================================
# Pane Management
# ==============================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==============================================
# Session Management
# ==============================================
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind s choose-tree -Zs  # show sessions only
bind w choose-tree -Zw  # show windows only
bind S command-prompt -p "New session name:" "new-session -d -s '%1' ; switch-client -t '%1'"
bind Tab switch-client -l  # switch to last session
bind b set-option -g status

# ==============================================
# General Settings
# ==============================================
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1

# ==============================================
# Status Bar — Void Linux
# ==============================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#0f0f0f,fg=#d4d4d4"

# Pane borders
set -g pane-border-style        "fg=#2a2a2a"
set -g pane-active-border-style "fg=#478061"

# Message / command prompt
set -g message-style         "bg=#1a1a1a,fg=#d4d4d4"
set -g message-command-style "bg=#1a1a1a,fg=#6bc490"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#478061,bold] #S #[fg=#2a2a2a]│ "

# Right: git branch · time · date
set -g status-right-length 80
set -g status-right "\
#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | awk '{printf \"#[fg=#5ba7a0]%s \", $0}')\
#[fg=#2a2a2a]│ #[fg=#d7af5f]%H:%M #[fg=#2a2a2a]│ #[fg=#555555]%d.%m.%y "

# Window tabs
set -g window-status-separator " "
set -g window-status-format         "#[fg=#555555]#I:#W"
set -g window-status-current-format "#[fg=#478061,bold]#I:#W"

# ==============================================
# Plugins (TPM)
# ==============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
